<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>WayV AI 얼굴 탐지</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', sans-serif;
            background: #0f0f1a;
            color: #fff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px;
        }
        h1 {
            font-size: 2rem;
            margin-bottom: 8px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .subtitle {
            color: #888;
            margin-bottom: 40px;
            font-size: 0.95rem;
        }
        .upload-area {
            width: 100%;
            max-width: 500px;
            border: 2px dashed #444;
            border-radius: 16px;
            padding: 40px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            background: #1a1a2e;
            margin-bottom: 24px;
        }
        .upload-area:hover { border-color: #667eea; }
        .upload-area.dragover { border-color: #667eea; background: #1e1e3a; }
        .upload-icon { font-size: 3rem; margin-bottom: 12px; }
        .upload-text { color: #888; font-size: 0.9rem; }
        #fileInput { display: none; }
        .btn {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            padding: 14px 40px;
            border-radius: 50px;
            font-size: 1rem;
            cursor: pointer;
            transition: opacity 0.3s;
            margin-bottom: 40px;
        }
        .btn:hover { opacity: 0.85; }
        .btn:disabled { opacity: 0.4; cursor: not-allowed; }
        .preview-img {
            max-width: 200px;
            border-radius: 12px;
            margin-top: 16px;
            display: none;
        }
        .result-area {
            width: 100%;
            max-width: 600px;
            display: none;
        }
        .verdict-box {
            text-align: center;
            padding: 24px;
            border-radius: 16px;
            margin-bottom: 24px;
            background: #1a1a2e;
        }
        .verdict-text {
            font-size: 1.5rem;
            font-weight: bold;
            margin-bottom: 12px;
        }
        .prob-bar-bg {
            background: #333;
            border-radius: 50px;
            height: 12px;
            overflow: hidden;
            margin: 12px 0;
        }
        .prob-bar {
            height: 100%;
            border-radius: 50px;
            transition: width 1s ease;
        }
        .prob-text {
            font-size: 0.9rem;
            color: #aaa;
        }
        .images-row {
            display: flex;
            gap: 16px;
            justify-content: center;
        }
        .image-box {
            flex: 1;
            background: #1a1a2e;
            border-radius: 16px;
            padding: 16px;
            text-align: center;
        }
        .image-box h3 {
            font-size: 0.9rem;
            color: #888;
            margin-bottom: 12px;
        }
        .image-box img {
            width: 100%;
            border-radius: 8px;
        }
        .loading {
            display: none;
            text-align: center;
            color: #888;
            padding: 20px;
        }
        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid #333;
            border-top-color: #667eea;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 12px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <h1>🔍 AI 얼굴 탐지 시스템</h1>
    <p class="subtitle">이미지를 업로드하면 AI가 생성한 가짜 얼굴인지 판별합니다</p>

    <div class="upload-area" id="uploadArea" onclick="document.getElementById('fileInput').click()">
        <div class="upload-icon">📁</div>
        <p>클릭하거나 이미지를 드래그하세요</p>
        <p class="upload-text">PNG, JPG 지원</p>
        <img id="previewImg" class="preview-img">
    </div>

    <input type="file" id="fileInput" accept="image/*">
    <button class="btn" id="detectBtn" onclick="detect()" disabled>탐지 시작</button>

    <div class="loading" id="loading">
        <div class="spinner"></div>
        <p>분석 중...</p>
    </div>

    <div class="result-area" id="resultArea">
        <div class="verdict-box" id="verdictBox">
            <div class="verdict-text" id="verdictText"></div>
            <div class="prob-bar-bg">
                <div class="prob-bar" id="probBar"></div>
            </div>
            <div class="prob-text" id="probText"></div>
        </div>
        <div class="images-row">
            <div class="image-box">
                <h3>원본 이미지</h3>
                <img id="originalImg">
            </div>
            <div class="image-box">
                <h3>🔥 위조 탐지 히트맵</h3>
                <img id="heatmapImg">
            </div>
        </div>
    </div>

    <script>
        const fileInput = document.getElementById('fileInput');
        const detectBtn = document.getElementById('detectBtn');
        const previewImg = document.getElementById('previewImg');
        const uploadArea = document.getElementById('uploadArea');

        fileInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = (e) => {
                    previewImg.src = e.target.result;
                    previewImg.style.display = 'block';
                    detectBtn.disabled = false;
                };
                reader.readAsDataURL(file);
            }
        });

        uploadArea.addEventListener('dragover', (e) => {
            e.preventDefault();
            uploadArea.classList.add('dragover');
        });
        uploadArea.addEventListener('dragleave', () => uploadArea.classList.remove('dragover'));
        uploadArea.addEventListener('drop', (e) => {
            e.preventDefault();
            uploadArea.classList.remove('dragover');
            const file = e.dataTransfer.files[0];
            if (file) {
                fileInput.files = e.dataTransfer.files;
                const reader = new FileReader();
                reader.onload = (e) => {
                    previewImg.src = e.target.result;
                    previewImg.style.display = 'block';
                    detectBtn.disabled = false;
                };
                reader.readAsDataURL(file);
            }
        });

        async function detect() {
            const file = fileInput.files[0];
            if (!file) return;

            document.getElementById('loading').style.display = 'block';
            document.getElementById('resultArea').style.display = 'none';
            detectBtn.disabled = true;

            const formData = new FormData();
            formData.append('file', file);

            try {
                const response = await fetch('/detect', {
                    method: 'POST',
                    body: formData
                });
                const data = await response.json();

                if (data.error) {
                    alert(data.error);
                    return;
                }

                document.getElementById('loading').style.display = 'none';
                document.getElementById('resultArea').style.display = 'block';

                document.getElementById('verdictText').textContent = data.verdict;
                document.getElementById('verdictText').style.color = data.color;
                document.getElementById('verdictBox').style.borderLeft = `4px solid ${data.color}`;
                document.getElementById('probBar').style.width = data.fake_prob + '%';
                document.getElementById('probBar').style.background = data.color;
                document.getElementById('probText').textContent = `AI 생성 확률: ${data.fake_prob}%`;
                document.getElementById('originalImg').src = 'data:image/png;base64,' + data.original;
                document.getElementById('heatmapImg').src = 'data:image/png;base64,' + data.heatmap;

            } catch (err) {
                document.getElementById('loading').style.display = 'none';
                alert('오류가 발생했습니다: ' + err.message);
            }

            detectBtn.disabled = false;
        }
    </script>
</body>
</html>
